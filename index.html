<!DOCTYPE html>
<html lang="pt-br">
<head>
    <title>Quadrado Clicker</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Principal.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="Principal_novo.js" defer></script>
    <link rel="shortcut icon" type="image/x-icon" href="icon.jpg">
</head>

<body>
    <main id="tela-login" class="conteiner">
        <h1>Quadrado Clicker</h1>
        <div class="login-box">
            <p>Entre com seu Email:</p>
            <input type="email" id="nick-input" placeholder="Seu email...">
            <input type="password" id="senha-input" placeholder="Senha (mín. 6 caracteres)">
            <button id="btn-iniciar" onclick="iniciarJogo()">COMEÇAR JOGO</button>
        </div>
    </main>

    <main class="conteiner" id="tela-jogo">
        <div class="medidor">
            <h2 id="exibir-nick"></h2>
            <h1 id="medidor">0</h1>
        </div>

        <button class="quadrado" id="quadr" onclick="din()">clique aqui</button>
        <h4 id="vps">Valor por segundo: 0</h4>

        <div class="grid-botoes">
            <button id="up1" onclick="upgrade(0)"></button>
            <button id="aut1" onclick="automatizar(0)"></button>
            <button id="up2" onclick="upgrade(1)"></button>
            <button id="aut2" onclick="automatizar(1)"></button>
            <button id="up3" onclick="upgrade(2)"></button>
            <button id="aut3" onclick="automatizar(2)"></button>
            <button id="up4" onclick="upgrade(3)"></button>
            <button id="aut4" onclick="automatizar(3)"></button>
            <button id="up5" onclick="upgrade(4)"></button>
            <button id="aut5" onclick="automatizar(4)"></button>
            <button id="up6" onclick="upgrade(5)"></button>
            <button id="aut6" onclick="automatizar(5)"></button>
            <button id="mult1" class="botao-largo" onclick="multiplicador(0)"></button>
            <button id="mult2" class="botao-largo" onclick="multiplicador(1)"></button>
        </div>
    </main>

    <section id="aba-leaderboard" class="leaderboard-caixa-externa">
        <h3>🏆 TABELA DE LIDERES</h3>
        <table id="tabela-leaderboard">
            <thead>
                <tr>
                    <th>Posição</th>
                    <th>Nome</th>
                    <th>Pontos</th>
                    <th>Total</th>
                </tr>
            </thead>
            <tbody id="corpo-leaderboard">
                <tr>
                    <td colspan="4">Carregando classificação...</td>
                </tr>
            </tbody>
        </table>
    </section>

    <div class="centralizar-reset" id="area-reset">
        <button class="reset-btn" onclick="reset()">Resetar Progresso</button>
    </div>

    <div id="custom-modal" class="modal-sobreposicao">
        <div class="modal-caixa">
            <h3>Criar Nova Conta?</h3>
            <p id="modal-mensagem"></p>
            <div class="modal-botoes">
                <button id="btn-modal-confirmar" class="btn-confirmar">Sim, Criar</button>
                <button onclick="fecharModal()" class="btn-cancelar">Cancelar</button>
            </div>
        </div>
    </div>

    <div id="custom-toast" class="toast-aviso"></div>

    <footer>&copy; MacacoSamurai</footer>
</body>
</html>
